<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>观音衣在线报名</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#b22222,#ffcc99);
}

.wrapper{
max-width:600px;
margin:20px auto;
padding:16px;
}

.card{
background:#fff;
border-radius:16px;
padding:20px;
box-shadow:0 8px 24px rgba(0,0,0,0.15);
}

h1{
text-align:center;
color:#b22222;
margin-top:0;
}

.top{
text-align:center;
color:#666;
margin-top:-6px;
}

label{
display:block;
font-weight:bold;
margin:12px 0 6px;
}

input, textarea{
width:100%;
box-sizing:border-box;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

textarea{
resize:vertical;
}

.info{
margin-top:14px;
font-size:18px;
font-weight:bold;
color:green;
}

button{
width:100%;
margin-top:18px;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
background:#b22222;
color:#fff;
cursor:pointer;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

.note{
text-align:center;
font-size:13px;
color:#777;
margin-top:12px;
}

</style>
</head>

<body>

<div class="wrapper">
<div class="card">

<h1>观音衣在线报名</h1>
<p class="top">每个名字 RM15</p>

<form id="guanyinForm">

<label>联系人姓名 *</label>
<input type="text" id="contact" required>

<label>联系电话 *</label>
<input type="tel" id="phone" required pattern="[0-9]{9,11}">

<label>观音衣名字（每行一个） *</label>
<textarea id="names" rows="6" required placeholder="例如：
名字（合家）"></textarea>

<div class="info">
名字数量：<span id="count">0</span>
</div>

<div class="info">
总费用：RM <span id="total">0</span>
</div>

<button type="submit" id="submitBtn">
提交报名
</button>

</form>

<div class="note">
提交后资料会自动保存到 Google Sheets
</div>

</div>
</div>

<script>

const pricePerName = 15;
const url = "https://script.google.com/macros/s/AKfycbwxHVN5ik0ZOyzfjdHwh6V8IFeIGi_tSKoAHPwuS3jVs77SC2DBIu96tmPu9aVCIp39/exec";

const form = document.getElementById("guanyinForm");
const contactInput = document.getElementById("contact");
const phoneInput = document.getElementById("phone");
const namesInput = document.getElementById("names");
const countSpan = document.getElementById("count");
const totalSpan = document.getElementById("total");

namesInput.addEventListener("input", function(){

const names = namesInput.value
.split("\n")
.map(v=>v.trim())
.filter(v=>v!="");

countSpan.innerText = names.length;
totalSpan.innerText = names.length * pricePerName;

});

form.addEventListener("submit", function(e){

e.preventDefault();

const contact = contactInput.value.trim();
const phone = phoneInput.value.trim();

const names = namesInput.value
.split("\n")
.map(v=>v.trim())
.filter(v=>v!="");

if(contact===""){
alert("请输入联系人姓名");
return;
}

if(phone===""){
alert("请输入联系电话");
return;
}

if(names.length===0){
alert("请填写观音衣名字");
return;
}

const formData = new FormData();
formData.append("contact", contact);
formData.append("phone", phone);
formData.append("names", names.join("\n"));
formData.append("total", totalSpan.innerText);

fetch(url,{
method:"POST",
body:formData,
mode:"no-cors"
});

alert("报名成功");

form.reset();
countSpan.innerText = 0;
totalSpan.innerText = 0;

});
</script>

</body>
</html>
